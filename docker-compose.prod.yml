services:
  db:
    restart: always

  web:
    restart: always
    ports: []
    expose:
      - "8069"
      - "8072"

  nginx:
    image: nginx:alpine
    container_name: odooerp-nginx
    restart: always
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/odoo.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx

volumes:
  nginx-logs:
