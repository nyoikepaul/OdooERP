services:
  db:
    image: postgres:16
    container_name: odooerp-db-1
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=your_secure_password   # CHANGE THIS TO A STRONG PASSWORD!
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "odoo"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: odoo:18.0
    container_name: odooerp-web-1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=your_secure_password   # MUST match the one above
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
    restart: unless-stopped

volumes:
  odoo-db-data:
  odoo-web-data:
