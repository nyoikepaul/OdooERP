name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install flake8 pylint

      - name: Lint custom_addons with flake8
        run: |
          flake8 custom_addons/ \
            --max-line-length=120 \
            --exclude=__pycache__,*.pyc \
            --statistics || true

      - name: Validate docker-compose syntax
        run: docker compose config -q

      - name: Validate docker-compose.prod syntax
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config -q

  structure:
    name: Repo Structure Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          for f in LICENSE README.md .env.example docker-compose.yml docker-compose.prod.yml config/odoo.conf nginx/odoo.conf CHANGELOG.md; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            else
              echo "OK: $f"
            fi
          done

      - name: Check .env is not committed
        run: |
          if [ -f ".env" ]; then
            echo "ERROR: .env file is committed! Remove it immediately."
            exit 1
          fi
          echo "OK: .env not in repo"
